name: validate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # https://github.com/home-assistant/actions/commits/master/hassfest
      - uses: home-assistant/actions/hassfest@dce0e860c68256ef2902ece06afa5401eb4674e1

      # https://github.com/hacs/action/commits/main
      - uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485
        with:
          category: integration
          ignore: brands
